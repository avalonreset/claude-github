name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? What's missing or frustrating?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? What would the ideal outcome look like?
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Which area?
      description: Which part of the skill suite does this relate to?
      options:
        - Audit scoring
        - README generation
        - Legal / licensing
        - Metadata / topics
        - SEO / keyword research
        - Community files
        - Release management
        - Portfolio / empire mode
        - Installer
        - New skill idea
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about or workarounds you're using now.
